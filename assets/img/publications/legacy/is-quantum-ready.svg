  <text x="858" y="424" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="760" fill="#1f2328">PostgreSQL</text>
<text x="858" y="445" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="760" fill="#1f2328">execution</text>
</g>

<line x1="450" y1="427" x2="462" y2="427" stroke="#0b7285" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="760" y1="427" x2="772" y2="427" stroke="#0b7285" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="600" y="520" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" fill="#6f1d1b">key visual: feasibility is a systems question, not just a solver benchmark</text>

  </g>

  <rect x="112" y="545" width="976" height="58" rx="18" fill="#f8fbfd" stroke="#e5ded4"/>
  <text x="600" y="568" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="820" fill="#6f1d1b">Contribution: feasibility evidence for latency-constrained quantum-augmented</text>
<text x="600" y="593" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="820" fill="#6f1d1b">optimization.</text>
