  <circle cx="80" cy="52" r="18" fill="#0b7285" stroke="#ffffff" stroke-width="4"/><text x="80" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#6f1d1b">DB task</text><circle cx="300" cy="52" r="18" fill="#0b7285" stroke="#ffffff" stroke-width="4"/><text x="300" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#6f1d1b">QUBO</text><circle cx="520" cy="52" r="18" fill="#0b7285" stroke="#ffffff" stroke-width="4"/><text x="520" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#6f1d1b">solve</text><circle cx="740" cy="52" r="18" fill="#0b7285" stroke="#ffffff" stroke-width="4"/><text x="740" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#6f1d1b">plan</text><circle cx="900" cy="52" r="18" fill="#0b7285" stroke="#ffffff" stroke-width="4"/><text x="900" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#6f1d1b">execute</text>
  <path d="M70 52 H520" stroke="#0b7285" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
