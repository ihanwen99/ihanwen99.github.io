<text x="121" y="95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">ICDE</text>

  <rect x="892" y="72" width="122" height="34" rx="17" fill="#f4ebe5" stroke="#ead5c8"/>
<text x="953" y="95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#6f1d1b">lightning</text>

  <rect x="1012" y="72" width="112" height="34" rx="17" fill="#2f6b3f" stroke="none"/>
<text x="1068" y="95" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffffff">accepted</text>

