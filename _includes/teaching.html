<section id="teaching" class="section section-compact">
  <div class="section-heading">
    <h2>Teaching</h2>
  </div>

  <div class="compact-list">
    {% for item in site.data.teaching %}
      <article>
        <div>
          <strong>{{ item.role | escape }}</strong>
          <span>
            {% if item.course_url %}
              <a href="{{ item.course_url | escape }}">{{ item.course | escape }}</a>
            {% else %}
              {{ item.course | escape }}
            {% endif %}
          </span>
        </div>
        <time>{{ item.term | escape }}</time>
      </article>
    {% endfor %}
  </div>
</section>
